<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#52606d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="440" fill="#ffffff"/>
  <text x="24" y="34" font-size="19" font-weight="700" fill="#1f2933">Два пути подключения 3D-лидара в Nav2</text>

  <!-- 3D lidar + PointCloud2 -->
  <rect x="24" y="190" width="150" height="64" rx="12" fill="#1f2933"/>
  <text x="99" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3D-лидар</text>
  <text x="99" y="237" font-size="11" fill="#cbd2d9" text-anchor="middle">Velodyne · Ouster · Livox</text>

  <rect x="200" y="196" width="172" height="52" rx="26" fill="#eef2f6" stroke="#616e7c" stroke-width="2"/>
  <text x="286" y="218" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle">/points</text>
  <text x="286" y="236" font-size="11" fill="#52606d" text-anchor="middle">sensor_msgs/PointCloud2</text>

  <line x1="174" y1="222" x2="196" y2="222" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>

  <!-- Path A (top) -->
  <text x="395" y="64" font-size="13" font-weight="700" fill="#b54708">Путь A — сплющить в 2D</text>
  <rect x="395" y="80" width="184" height="56" rx="12" fill="#fff3e8" stroke="#f0712f" stroke-width="2"/>
  <text x="487" y="105" font-size="12.5" font-weight="700" fill="#b54708" text-anchor="middle">pointcloud_to_</text>
  <text x="487" y="122" font-size="12.5" font-weight="700" fill="#b54708" text-anchor="middle">laserscan</text>

  <rect x="606" y="82" width="86" height="52" rx="26" fill="#fff3e8" stroke="#f0712f" stroke-width="2"/>
  <text x="649" y="113" font-size="13.5" font-weight="700" fill="#b54708" text-anchor="middle">/scan</text>

  <rect x="716" y="78" width="160" height="60" rx="12" fill="#f5f7fa" stroke="#cbd2d9" stroke-width="1.5"/>
  <text x="796" y="102" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">2D-стек Nav2</text>
  <text x="796" y="120" font-size="11.5" fill="#52606d" text-anchor="middle">costmap + AMCL</text>

  <line x1="579" y1="108" x2="602" y2="108" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>
  <line x1="692" y1="108" x2="712" y2="108" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>
  <path d="M372,210 C400,180 400,150 420,138" fill="none" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>

  <!-- Path B (bottom) -->
  <text x="395" y="300" font-size="13" font-weight="700" fill="#276749">Путь B — объёмная costmap</text>
  <rect x="395" y="312" width="184" height="60" rx="12" fill="#edf7ee" stroke="#2f855a" stroke-width="2"/>
  <text x="487" y="337" font-size="13" font-weight="700" fill="#276749" text-anchor="middle">Voxel / STVL</text>
  <text x="487" y="355" font-size="12.5" fill="#276749" text-anchor="middle">Layer</text>

  <rect x="620" y="310" width="256" height="64" rx="12" fill="#f5f7fa" stroke="#cbd2d9" stroke-width="1.5"/>
  <text x="748" y="336" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">3D-costmap</text>
  <text x="748" y="354" font-size="11.5" fill="#52606d" text-anchor="middle">проекция в 2D для планировщика</text>

  <line x1="579" y1="342" x2="616" y2="342" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>
  <path d="M372,234 C400,264 400,300 420,314" fill="none" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr3)"/>

  <text x="24" y="416" font-size="12" fill="#9aa5b1">Путь A не меняет 2D-стек урока. Путь B учитывает препятствия по высоте (нависающие, разной высоты), но требует больше вычислений.</text>
</svg>

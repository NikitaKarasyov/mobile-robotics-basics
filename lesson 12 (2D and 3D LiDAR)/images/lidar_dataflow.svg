<svg viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#52606d"/>
    </marker>
    <marker id="arrb" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#9aa5b1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="430" fill="#ffffff"/>
  <text x="24" y="34" font-size="19" font-weight="700" fill="#1f2933">Куда идут данные лидара</text>

  <!-- Driver node -->
  <rect x="32" y="150" width="170" height="74" rx="12" fill="#1f2933"/>
  <text x="117" y="183" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Драйвер лидара</text>
  <text x="117" y="203" font-size="12" fill="#cbd2d9" text-anchor="middle">RPLIDAR, Hokuyo, …</text>

  <!-- /scan topic pill -->
  <rect x="262" y="158" width="186" height="58" rx="29" fill="#fff3e8" stroke="#f0712f" stroke-width="2"/>
  <text x="355" y="183" font-size="15" font-weight="700" fill="#b54708" text-anchor="middle">/scan</text>
  <text x="355" y="202" font-size="11.5" fill="#b54708" text-anchor="middle">sensor_msgs/LaserScan</text>

  <line x1="202" y1="187" x2="258" y2="187" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- Consumers -->
  <g>
    <rect x="588" y="48" width="200" height="62" rx="12" fill="#f5f7fa" stroke="#cbd2d9" stroke-width="1.5"/>
    <text x="688" y="74" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle">Costmap</text>
    <text x="688" y="93" font-size="12" fill="#52606d" text-anchor="middle">Obstacle Layer (Nav2)</text>

    <rect x="588" y="156" width="200" height="62" rx="12" fill="#f5f7fa" stroke="#cbd2d9" stroke-width="1.5"/>
    <text x="688" y="182" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle">AMCL</text>
    <text x="688" y="201" font-size="12" fill="#52606d" text-anchor="middle">локализация на карте</text>

    <rect x="588" y="264" width="200" height="62" rx="12" fill="#f5f7fa" stroke="#cbd2d9" stroke-width="1.5"/>
    <text x="688" y="290" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle">SLAM Toolbox</text>
    <text x="688" y="309" font-size="12" fill="#52606d" text-anchor="middle">построение карты</text>
  </g>

  <!-- Arrows from /scan to consumers -->
  <path d="M448,178 C520,150 528,90 584,79" fill="none" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr)"/>
  <path d="M448,187 L584,187" fill="none" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr)"/>
  <path d="M448,196 C520,224 528,284 584,295" fill="none" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- TF chain -->
  <rect x="32" y="318" width="210" height="64" rx="12" fill="#eef2f6" stroke="#9aa5b1" stroke-width="1.5"/>
  <text x="137" y="345" font-size="13" font-weight="700" fill="#1f2933" text-anchor="middle">robot_state_publisher</text>
  <text x="137" y="364" font-size="12" fill="#52606d" text-anchor="middle">из URDF (урок 5)</text>

  <rect x="300" y="322" width="220" height="56" rx="28" fill="#edf7ee" stroke="#2f855a" stroke-width="2"/>
  <text x="410" y="346" font-size="13.5" font-weight="700" fill="#276749" text-anchor="middle">base_link → laser</text>
  <text x="410" y="365" font-size="11.5" fill="#276749" text-anchor="middle">статическая трансформация (tf)</text>

  <line x1="242" y1="350" x2="296" y2="350" stroke="#52606d" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- TF needed by everyone (dashed) -->
  <path d="M520,346 C600,330 640,330 688,326" fill="none" stroke="#9aa5b1" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrb)"/>
  <text x="556" y="406" font-size="12" fill="#7b8794">Без tf-фрейма лидара данные нельзя положить на карту — фрейм нужен всем потребителям.</text>
</svg>

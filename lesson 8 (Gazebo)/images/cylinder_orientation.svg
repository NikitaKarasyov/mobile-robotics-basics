<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Ориентация цилиндра колеса в URDF</title>
  <desc>Объяснение почему нужен поворот rpy 1.57 и ось вращения Y</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; }
  </style>

  <!-- ЛЕВАЯ ЧАСТЬ -->
  <text class="th" x="160" y="32" text-anchor="middle">По умолчанию в URDF</text>
  <text class="ts" x="160" y="50" text-anchor="middle" fill="#666">rpy="0 0 0"</text>

  <!-- Оси -->
  <line x1="160" y1="340" x2="160" y2="260" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="172" y="258" fill="#E24B4A">Z</text>
  <line x1="160" y1="340" x2="240" y2="340" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="244" y="344" fill="#3B8BD4">X</text>
  <line x1="160" y1="340" x2="118" y2="370" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="102" y="382" fill="#1D9E75">Y</text>

  <!-- Вертикальный цилиндр -->
  <ellipse cx="160" cy="200" rx="36" ry="10" fill="none" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="160" cy="310" rx="36" ry="10" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="124" y1="200" x2="124" y2="310" stroke="#888" stroke-width="1.5"/>
  <line x1="196" y1="200" x2="196" y2="310" stroke="#888" stroke-width="1.5"/>
  <line x1="160" y1="185" x2="160" y2="325" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="ts" x="168" y="182" fill="#E24B4A">ось симметрии = Z</text>

  <!-- Метка -->
  <rect x="108" y="68" width="104" height="32" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text class="ts" x="160" y="88" text-anchor="middle" fill="#993C1D">колесо стоит вертикально</text>
  <text class="ts" x="160" y="115" text-anchor="middle" fill="#666">не катится!</text>

  <!-- СТРЕЛКА ПЕРЕХОДА -->
  <line x1="280" y1="240" x2="390" y2="240" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="335" y="228" text-anchor="middle" fill="#666">rpy=</text>
  <text class="th" x="335" y="244" text-anchor="middle">"1.57 0 0"</text>
  <text class="ts" x="335" y="260" text-anchor="middle" fill="#666">поворот 90° вокруг X</text>

  <!-- ПРАВАЯ ЧАСТЬ -->
  <text class="th" x="530" y="32" text-anchor="middle">После поворота</text>
  <text class="ts" x="530" y="50" text-anchor="middle" fill="#666">rpy="1.57075 0 0"</text>

  <!-- Оси -->
  <line x1="530" y1="340" x2="530" y2="260" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="542" y="258" fill="#E24B4A">Z</text>
  <line x1="530" y1="340" x2="610" y2="340" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="614" y="344" fill="#3B8BD4">X</text>
  <line x1="530" y1="340" x2="488" y2="370" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="472" y="382" fill="#1D9E75">Y</text>

  <!-- Горизонтальный цилиндр -->
  <ellipse cx="490" cy="255" rx="10" ry="36" fill="none" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="570" cy="255" rx="10" ry="36" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="490" y1="219" x2="570" y2="219" stroke="#888" stroke-width="1.5"/>
  <line x1="490" y1="291" x2="570" y2="291" stroke="#888" stroke-width="1.5"/>
  <line x1="474" y1="255" x2="588" y2="255" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="ts" x="530" y="318" text-anchor="middle" fill="#1D9E75">ось симметрии = Y</text>

  <!-- Стрелка вращения -->
  <path d="M495 220 Q480 205 490 195 Q500 185 515 195" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="490" y="180" text-anchor="middle" fill="#1D9E75">axis xyz="0 1 0"</text>
  <text class="ts" x="490" y="166" text-anchor="middle" fill="#1D9E75">вращается вокруг Y</text>

  <!-- Метка хорошо -->
  <rect x="462" y="68" width="136" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="530" y="88" text-anchor="middle" fill="#085041">колесо лежит на боку</text>
  <text class="ts" x="530" y="115" text-anchor="middle" fill="#666">катится вперёд!</text>
</svg>

<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
  <title>Ориентация цилиндра колеса в URDF</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; fill: #222; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; }
  </style>

  <!-- Фон -->
  <rect width="680" height="420" fill="#ffffff"/>

  <!-- ===== ЛЕВАЯ ЧАСТЬ ===== -->
  <text class="th" x="160" y="30" text-anchor="middle">По умолчанию в URDF</text>
  <text class="ts" x="160" y="48" text-anchor="middle" fill="#555">rpy="0 0 0"</text>

  <!-- Оси -->
  <line x1="160" y1="340" x2="160" y2="265" stroke="#cc3333" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="170" y="262" fill="#cc3333" font-weight="600">Z</text>
  <line x1="160" y1="340" x2="235" y2="340" stroke="#2266cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="239" y="344" fill="#2266cc" font-weight="600">X</text>
  <line x1="160" y1="340" x2="120" y2="372" stroke="#117744" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="104" y="384" fill="#117744" font-weight="600">Y</text>

  <!-- Вертикальный цилиндр -->
  <ellipse cx="160" cy="205" rx="38" ry="11" fill="#f0f0f0" stroke="#444" stroke-width="1.5"/>
  <rect x="122" y="205" width="76" height="110" fill="#e8e8e8" stroke="none"/>
  <ellipse cx="160" cy="315" rx="38" ry="11" fill="#e0e0e0" stroke="#444" stroke-width="1.5"/>
  <line x1="122" y1="205" x2="122" y2="315" stroke="#444" stroke-width="1.5"/>
  <line x1="198" y1="205" x2="198" y2="315" stroke="#444" stroke-width="1.5"/>

  <!-- Ось симметрии цилиндра -->
  <line x1="160" y1="188" x2="160" y2="330" stroke="#cc3333" stroke-width="2" stroke-dasharray="7 4"/>
  <text class="ts" x="165" y="186" fill="#cc3333">ось симметрии = Z</text>

  <!-- Метка плохо -->
  <rect x="96" y="66" width="128" height="28" rx="6" fill="#ffe0e0" stroke="#cc3333" stroke-width="1.5"/>
  <text class="ts" x="160" y="84" text-anchor="middle" fill="#882222" font-weight="600">колесо вертикально</text>
  <text class="ts" x="160" y="112" text-anchor="middle" fill="#882222">❌ не катится</text>

  <!-- ===== СТРЕЛКА ПЕРЕХОДА ===== -->
  <line x1="282" y1="250" x2="386" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="334" y="238" text-anchor="middle" fill="#333">rpy=</text>
  <text class="th" x="334" y="252" text-anchor="middle">"1.57 0 0"</text>
  <text class="ts" x="334" y="268" text-anchor="middle" fill="#555">поворот 90° вокруг X</text>

  <!-- ===== ПРАВАЯ ЧАСТЬ ===== -->
  <text class="th" x="530" y="30" text-anchor="middle">После поворота</text>
  <text class="ts" x="530" y="48" text-anchor="middle" fill="#555">rpy="1.57075 0 0"</text>

  <!-- Оси -->
  <line x1="530" y1="340" x2="530" y2="265" stroke="#cc3333" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="540" y="262" fill="#cc3333" font-weight="600">Z</text>
  <line x1="530" y1="340" x2="605" y2="340" stroke="#2266cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="609" y="344" fill="#2266cc" font-weight="600">X</text>
  <line x1="530" y1="340" x2="490" y2="372" stroke="#117744" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="474" y="384" fill="#117744" font-weight="600">Y</text>

  <!-- Горизонтальный цилиндр -->
  <ellipse cx="492" cy="255" rx="11" ry="38" fill="#f0f0f0" stroke="#444" stroke-width="1.5"/>
  <rect x="492" y="217" width="76" height="76" fill="#e8e8e8" stroke="none"/>
  <ellipse cx="568" cy="255" rx="11" ry="38" fill="#e0e0e0" stroke="#444" stroke-width="1.5"/>
  <line x1="492" y1="217" x2="568" y2="217" stroke="#444" stroke-width="1.5"/>
  <line x1="492" y1="293" x2="568" y2="293" stroke="#444" stroke-width="1.5"/>

  <!-- Ось симметрии горизонтальная -->
  <line x1="474" y1="255" x2="586" y2="255" stroke="#117744" stroke-width="2" stroke-dasharray="7 4"/>
  <text class="ts" x="530" y="320" text-anchor="middle" fill="#117744">ось симметрии = Y</text>

  <!-- Стрелка вращения -->
  <path d="M497 218 Q480 200 492 190 Q504 180 518 190" fill="none" stroke="#117744" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="496" y="176" text-anchor="middle" fill="#117744">axis xyz="0 1 0"</text>
  <text class="ts" x="496" y="162" text-anchor="middle" fill="#555">вращается вокруг Y</text>

  <!-- Метка хорошо -->
  <rect x="454" y="66" width="152" height="28" rx="6" fill="#d4f5e4" stroke="#117744" stroke-width="1.5"/>
  <text class="ts" x="530" y="84" text-anchor="middle" fill="#0a5c30" font-weight="600">колесо лежит на боку</text>
  <text class="ts" x="530" y="112" text-anchor="middle" fill="#0a5c30">✓ катится вперёд</text>

</svg>
